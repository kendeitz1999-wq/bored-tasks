<!DOCTYPE html>
<!-- Single-page app shell. Views render into <main id="bt-app"> via assets/app.js.
     Blog posts and legal pages are separate .html files. Add content in
     assets/data.js and assets/quizzes/*.js. See README.md. -->
<html lang="en" data-base="" data-year="2026" class="bt-preload">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ===== Google AdSense loader (publisher-level) =====
       Ad units are rendered by assets/ui.js (footer, all pages) and
       assets/app.js (in-content slots across the SPA). Set your ad unit id in
       assets/ui.js (AD_SLOT) once and every unit goes live. -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2187417002831910" crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-2187417002831910" />

  <!-- ===== SEO / Social meta (app.js updates these per-route) ===== -->
  <title>Bored Tasks - Cure Your Boredom with Quizzes, Tasks &amp; Epic Ideas</title>
  <meta name="description" content="Bored? Take addictive personality quizzes and trivia, or pick from hundreds of fun things to do when you're bored. The ultimate boredom-busting playground." />
  <meta name="keywords" content="quizzes, personality quiz, trivia, things to do when bored, boredom busters, fun quiz, what should I do" />
  <meta name="author" content="Bored Tasks" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="canonical" href="https://boredtasks.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Bored Tasks" />
  <meta property="og:title" content="Bored Tasks - Cure Your Boredom" />
  <meta property="og:description" content="Addictive quizzes, trivia and hundreds of fun things to do when you're bored." />
  <meta property="og:image" content="https://boredtasks.com/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="BoredTasks - Cure Your Boredom" />
  <meta property="og:url" content="https://boredtasks.com/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Bored Tasks - Cure Your Boredom" />
  <meta name="twitter:description" content="Addictive quizzes, trivia and hundreds of fun things to do when you're bored." />
  <meta name="twitter:image" content="https://boredtasks.com/og-image.png" />
  <meta name="twitter:image:alt" content="BoredTasks - Cure Your Boredom" />

  <!-- Favicon (inline SVG: "B" monogram in the brand gradient) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%236366f1%22%2F%3E%3Cstop%20offset%3D%220.55%22%20stop-color%3D%22%238b5cf6%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23d946ef%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22url(%23g)%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2233%22%20font-family%3D%22Arial%2CHelvetica%2Csans-serif%22%20font-size%3D%2242%22%20font-weight%3D%22800%22%20fill%3D%22%230b1120%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22central%22%3EB%3C%2Ftext%3E%3C%2Fsvg%3E" />

  <!-- No-FOUC theme bootstrap: sets <html class="dark"> before paint so there's
       no flash. Default is dark; only an explicit "light" preference opts out. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem("bt_theme") !== "light") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>

  <!-- ===== Tailwind CSS via CDN + shared brand config (assets/tw.js) ===== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tw.js"></script>

  <link rel="stylesheet" href="assets/styles.css" />

  <!-- ===== JSON-LD: WebSite + SearchAction (rich SEO) ===== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Bored Tasks",
    "url": "https://boredtasks.example/",
    "description": "Addictive quizzes, trivia and hundreds of fun things to do when you're bored.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://boredtasks.example/index.html#/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body class="min-h-screen bg-white text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">

  <!-- Shared header (rendered by ui.js) -->
  <header id="bt-header"></header>

  <!-- The SPA renders every view into here. Each view places its own ad slots
       (ADSENSE PLACEHOLDER) so the hero can flow straight from the header. -->
  <main id="bt-app" class="min-h-[60vh]"></main>

  <!-- Shared footer (rendered by ui.js) -->
  <footer id="bt-footer"></footer>

  <!-- ===== Scripts =====
       Order matters: data.js defines BT_DATA, the quiz packs push into it,
       THEN app.js renders. ui.js (shared shell) self-boots independently. -->
  <script src="assets/data.js"></script>
  <script src="assets/quizzes/q-age-lovelang.js"></script>
  <script src="assets/quizzes/q-talent-redflag.js"></script>

  <script src="assets/quizzes/q-trivia-pack2.js"></script>
  <script src="assets/quizzes/q-short-pack.js"></script>
  <script src="assets/dares.js"></script>
  <script src="assets/stories.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
