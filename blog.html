<body class="min-h-screen bg-white text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <header id="bt-header"></header>

    <nav class="text-sm text-slate-400"><a href="index.html#/" class="hover:text-teal-500">Home</a> / <span class="text-slate-600 dark:text-slate-300">Blog</span></nav>
    <h1 class="mt-4 text-4xl font-black tracking-tight sm:text-5xl">The <span class="bt-gradient-text">Bored Tasks</span> Blog</h1>
    <p class="mt-4 max-w-2xl text-lg text-slate-500 dark:text-slate-400">The psychology of boredom, the science of why quizzes are so addictive, and a frankly absurd number of ideas for things to do. Grab a coffee and dive in.</p>

    <!-- ===== ADSENSE PLACEHOLDER (blog index banner) ===== -->
    <div class="bt-ad my-8 flex h-[90px] items-center justify-center rounded-xl border border-dashed border-slate-300 text-xs font-medium uppercase tracking-widest text-slate-400 dark:border-slate-700" data-ad-slot="blog-index">Advertisement</div>

  <footer id="bt-footer"></footer>

  <!-- data.js gives us BT_DATA.blogPosts; we render cards from it. -->
  <script src="assets/data.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    (function () {
      function imgUrl(u, w) { return u && u.indexOf("images.unsplash.com") > -1 ? u + (u.indexOf("?") > -1 ? "&" : "?") + "auto=format&fit=crop&w=" + w + "&q=70" : u; }
      function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
      var grid = document.getElementById("blog-grid");
      grid.innerHTML = (window.BT_DATA ? BT_DATA.blogPosts : []).map(function (p) {
        return '<a href="blog/' + p.slug + '.html" class="group flex flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-xl dark:border-slate-800 dark:bg-slate-900">' +
          '<div class="relative aspect-[16/9] overflow-hidden"><img loading="lazy" src="' + imgUrl(p.image, 700) + '" alt="' + esc(p.title) + '" class="h-full w-full object-cover transition duration-500 group-hover:scale-105"></div>' +
          '<div class="flex flex-1 flex-col p-5"><span class="text-xs font-bold uppercase tracking-wide text-coral-500">' + esc(p.category) + ' · ' + p.readMinutes + ' min read</span>' +
          '<h2 class="mt-2 text-lg font-extrabold leading-snug text-slate-900 group-hover:text-coral-500 dark:text-white">' + esc(p.title) + '</h2>' +
          '<p class="mt-2 flex-1 text-sm text-slate-500 dark:text-slate-400">' + esc(p.excerpt) + '</p>' +
          '<span class="mt-3 text-sm font-bold text-teal-500">Read article →</span></div></a>';
      }).join("");
    })();
  </script>
